name: CI - Run Tests

on:
  pull_request:
    branches:
      - develop
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: uks-dockerhub/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r uks-dockerhub/backend/requirements.txt

      - name: Run migrations
        working-directory: uks-dockerhub/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
        run: python manage.py migrate

      - name: Run tests
        working-directory: uks-dockerhub/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
        run: python manage.py test --verbosity=2
