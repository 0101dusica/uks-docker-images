name: CD - Build and Push Docker Image

on:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: uks-dockerhub/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r uks-dockerhub/backend/requirements.txt

      - name: Run migrations
        working-directory: uks-dockerhub/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
        run: python manage.py migrate

      - name: Run tests
        working-directory: uks-dockerhub/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
        run: python manage.py test --verbosity=2

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./uks-dockerhub
          file: ./uks-dockerhub/docker/backend/Dockerfile
          push: true
          tags: |
            0101dusica/uks-dockerhub:latest
            0101dusica/uks-dockerhub:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create tag from commit message
        run: |
          COMMIT_MESSAGE=$(git log -1 --format="%s" | tr -cd '[:alnum:]._-' | tr ' ' '_')
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${COMMIT_MESSAGE}" -m "$(git log -1 --format='%s')"
          git push origin "${COMMIT_MESSAGE}"
