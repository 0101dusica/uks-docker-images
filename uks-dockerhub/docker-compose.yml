version: '3.9'

services:
  backend:
    build: ./docker/backend
    env_file:
      - .env.example
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build: ./docker/frontend
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "8080:8080"

