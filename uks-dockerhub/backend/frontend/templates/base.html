{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Registration{% endblock %}</title>
    <style>
        .logout-link {
            position: fixed;
            top: 32px;
            right: 48px;
            z-index: 2000;
        }
        .logout-link a {
            color: #2d3a4b;
            background: #f5f7fa;
            border: 1px solid #b0b0b0;
            border-radius: 6px;
            padding: 7px 18px;
            font-weight: 500;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .logout-link a:hover {
            background: #e0eafc;
        }
    </style>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .form-box {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 2.5rem 2.5rem 2rem 2.5rem;
            min-width: 640px;
            max-width: 100vw;
        }
        h2 {
            margin-bottom: 1.5rem;
            color: #2d3a4b;
            font-weight: 600;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            color: #2d3a4b;
            font-size: 1rem;
            font-weight: 500;
            padding-left: 2px;
        }
        input, .form-input {
            width: 96%;
            margin: 0;
            display: block;
            padding: 0.6rem 0.8rem;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 1rem;
            background: #f7fafd;
            transition: border 0.2s;
        }
        input:focus, .form-input:focus {
            border: 1.5px solid #7ea1f7;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 0.7rem;
            background: #7ea1f7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #5b7be6;
        }
        .errorlist {
            color: #e74c3c;
            font-size: 0.95rem;
            margin: 0.2rem 0 0.5rem 0;
            list-style: none;
            padding: 0;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
    <body>
        {% if request.user.is_authenticated %}
        <div class="logout-link">
            <a href="{% url 'logout' %}">Logout</a>
        </div>
        {% endif %}
    {% block content %}{% endblock %}
</body>
</html>
