{% extends "base.html" %}
{% block title %}Edit Official Repository — UKSHub{% endblock %}
{% block content %}
<div class="page-centered">
<div class="form-box" style="max-width:540px;">
    <h2>Edit Official Repository</h2>
    <div style="text-align:center; margin-bottom:1.5rem;">
        <span style="font-weight:700; color:#2d3a4b;">{{ repo.name }}</span>
        <span style="background:#1a7f37; color:#fff; font-size:11px; padding:2px 8px; border-radius:4px; margin-left:8px;">Docker Official Image</span>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_description">Description</label>
            {{ form.description }}
        </div>
        <div class="form-group">
            <label for="id_visibility">Visibility</label>
            {{ form.visibility }}
        </div>
        <button type="submit" class="submit-btn">Save Changes</button>
        <div style="text-align:center; margin-top:1rem; font-size:0.9rem;">
            <a href="{% url 'admin-dashboard' %}">← Back to Dashboard</a>
        </div>
    </form>
</div>
</div>
{% endblock %}
